<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIFE REMAINING</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #00FF66;
    --green-dim: #00993D;
    --green-faint: #003D18;
    --white: #FFFFFF;
    --grey: #444444;
    --bg: #000000;
    --week-size: 10px;
    --week-gap: 2px;
  }

  html, body {
    background: var(--bg);
    color: var(--green);
    font-family: 'JetBrains Mono', Consolas, monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── SETUP SCREEN ── */
  #setup {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 32px 16px;
  }

  .setup-title {
    font-size: clamp(22px, 5vw, 40px);
    font-weight: 800;
    letter-spacing: 0.25em;
    color: var(--white);
    margin-bottom: 8px;
    text-align: center;
  }

  .setup-subtitle {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--green-dim);
    margin-bottom: 48px;
    text-align: center;
  }

  .setup-field {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 28px;
    width: 100%;
    max-width: 360px;
  }

  .setup-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--green-dim);
    text-transform: uppercase;
  }

  .setup-input {
    background: transparent;
    border: 1px solid var(--green-dim);
    color: var(--green);
    font-family: inherit;
    font-size: 16px;
    padding: 12px 16px;
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }

  .setup-input:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 1px var(--green-faint);
  }

  .setup-input::-webkit-calendar-picker-indicator {
    filter: invert(1) sepia(1) saturate(5) hue-rotate(100deg);
    cursor: pointer;
  }

  .setup-btn {
    background: var(--green);
    border: none;
    color: #000;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.2em;
    padding: 14px 40px;
    text-transform: uppercase;
    width: 100%;
    max-width: 360px;
    transition: opacity 0.15s;
    margin-top: 8px;
  }

  .setup-btn:hover { opacity: 0.85; }

  /* ── MAIN DASHBOARD ── */
  #dashboard {
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
    min-height: 100vh;
  }

  .dash-header {
    text-align: center;
    margin-bottom: 40px;
    width: 100%;
  }

  .dash-logo {
    font-size: clamp(14px, 3vw, 18px);
    letter-spacing: 0.4em;
    color: var(--green-dim);
    margin-bottom: 4px;
  }

  .cursor {
    display: inline-block;
    width: 10px;
    height: 1.1em;
    background: var(--green);
    vertical-align: text-bottom;
    animation: blink 1.1s step-end infinite;
    margin-left: 2px;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .weeks-label {
    font-size: clamp(11px, 2vw, 13px);
    letter-spacing: 0.3em;
    color: var(--green-dim);
    margin-bottom: 6px;
  }

  .weeks-number {
    font-size: clamp(52px, 12vw, 96px);
    font-weight: 800;
    color: var(--white);
    line-height: 1;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }

  .weeks-sub {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--green-dim);
  }

  /* ── STATS ROW ── */
  .stats {
    display: flex;
    flex-wrap: wrap;
    gap: 1px;
    width: 100%;
    max-width: 760px;
    margin: 36px 0 40px;
    border: 1px solid var(--green-faint);
  }

  .stat {
    flex: 1 1 120px;
    padding: 18px 16px;
    border: 1px solid var(--green-faint);
    text-align: center;
  }

  .stat-val {
    font-size: clamp(20px, 4vw, 28px);
    font-weight: 700;
    color: var(--white);
    display: block;
    margin-bottom: 4px;
  }

  .stat-key {
    font-size: 9px;
    letter-spacing: 0.25em;
    color: var(--green-dim);
    text-transform: uppercase;
  }

  /* ── GRID ── */
  .grid-section {
    width: 100%;
    max-width: 900px;
  }

  .grid-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .grid-label {
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--green-dim);
  }

  .legend {
    display: flex;
    gap: 16px;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--green-dim);
    align-items: center;
  }

  .legend-item { display: flex; align-items: center; gap: 6px; }

  .legend-box {
    width: 10px;
    height: 10px;
    flex-shrink: 0;
  }

  .legend-box.lived { background: var(--green); }
  .legend-box.remaining { background: transparent; border: 1px solid var(--green-dim); }

  #week-grid {
    display: flex;
    flex-wrap: wrap;
    gap: var(--week-gap);
    width: 100%;
  }

  .week-box {
    width: var(--week-size);
    height: var(--week-size);
    flex-shrink: 0;
  }

  .week-box.lived { background: var(--green); }
  .week-box.current { background: var(--white); }
  .week-box.remaining { background: transparent; border: 1px solid #1a1a1a; }

  /* ── FOOTER INFO ── */
  .info-block {
    width: 100%;
    max-width: 760px;
    margin-top: 40px;
    border: 1px solid var(--green-faint);
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px;
    border-bottom: 1px solid var(--green-faint);
    flex-wrap: wrap;
    gap: 8px;
  }

  .info-row:last-child { border-bottom: none; }

  .info-key {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--green-dim);
    text-transform: uppercase;
  }

  .info-val {
    font-size: 13px;
    color: var(--white);
    text-align: right;
  }

  /* ── PROGRESS BAR ── */
  .progress-row {
    padding: 14px 20px;
    border-bottom: 1px solid var(--green-faint);
  }

  .progress-top {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .progress-key {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--green-dim);
    text-transform: uppercase;
  }

  .progress-pct {
    font-size: 13px;
    color: var(--white);
  }

  .progress-track {
    width: 100%;
    height: 3px;
    background: var(--green-faint);
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: var(--green);
    transition: width 0.5s ease;
  }

  /* ── ACTIONS ── */
  .actions {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 760px;
    margin-top: 24px;
    flex-wrap: wrap;
  }

  .action-btn {
    flex: 1 1 auto;
    background: transparent;
    border: 1px solid var(--green-dim);
    color: var(--green-dim);
    cursor: pointer;
    font-family: inherit;
    font-size: 9px;
    letter-spacing: 0.2em;
    padding: 12px 16px;
    text-transform: uppercase;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .action-btn:hover {
    border-color: var(--green);
    color: var(--green);
  }

  /* ── FULLSCREEN ── */
  body.fullscreen #dashboard {
    padding: 20px;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #000; }
  ::-webkit-scrollbar-thumb { background: var(--green-dim); }

  @media (max-width: 480px) {
    :root { --week-size: 7px; --week-gap: 1px; }
    .stat { padding: 14px 10px; }
  }
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="setup-title">LIFE REMAINING</div>
  <div class="setup-subtitle">INITIALIZE PARAMETERS<span class="cursor"></span></div>

  <div class="setup-field">
    <label class="setup-label" for="dob">Date of Birth</label>
    <input class="setup-input" type="date" id="dob" required>
  </div>

  <div class="setup-field">
    <label class="setup-label" for="lifespan">Expected Lifespan (years)</label>
    <input class="setup-input" type="number" id="lifespan" value="80" min="1" max="150">
  </div>

  <button class="setup-btn" onclick="launch()">BOOT SYSTEM</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="dash-header">
    <div class="dash-logo">// LIFE REMAINING <span class="cursor"></span></div>
    <div class="weeks-label">WEEKS REMAINING</div>
    <div class="weeks-number" id="weeks-big">—</div>
    <div class="weeks-sub">OF <span id="total-weeks-label">—</span> TOTAL WEEKS</div>
  </div>

  <div class="stats">
    <div class="stat">
      <span class="stat-val" id="stat-years">—</span>
      <span class="stat-key">Years</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="stat-months">—</span>
      <span class="stat-key">Months</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="stat-weeks">—</span>
      <span class="stat-key">Weeks</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="stat-days">—</span>
      <span class="stat-key">Days</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="stat-hours">—</span>
      <span class="stat-key">Hours</span>
    </div>
  </div>

  <div class="grid-section">
    <div class="grid-header">
      <div class="grid-label">// LIFE IN WEEKS — EACH SQUARE = 1 WEEK</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-box lived"></div>LIVED</div>
        <div class="legend-item"><div class="legend-box remaining"></div>REMAINING</div>
      </div>
    </div>
    <div id="week-grid"></div>
  </div>

  <div class="info-block">
    <div class="progress-row">
      <div class="progress-top">
        <span class="progress-key">Life Elapsed</span>
        <span class="progress-pct" id="pct-lived">—%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-bar" style="width:0%"></div>
      </div>
    </div>
    <div class="info-row">
      <span class="info-key">Born</span>
      <span class="info-val" id="info-dob">—</span>
    </div>
    <div class="info-row">
      <span class="info-key">Expected End</span>
      <span class="info-val" id="info-death">—</span>
    </div>
    <div class="info-row">
      <span class="info-key">Life Remaining</span>
      <span class="info-val" id="info-pct-remaining">—%</span>
    </div>
  </div>

  <div class="actions">
    <button class="action-btn" onclick="toggleFullscreen()">⛶ FULLSCREEN</button>
    <button class="action-btn" onclick="exportWallpaper()">↓ EXPORT</button>
    <button class="action-btn" onclick="resetApp()">⟳ RESET</button>
  </div>

</div>

<script>
const STORAGE_KEY = 'life_remaining_v1';

function launch() {
  const dobVal = document.getElementById('dob').value;
  const span = parseInt(document.getElementById('lifespan').value) || 80;
  if (!dobVal) { alert('Please enter your date of birth.'); return; }
  const data = { dob: dobVal, lifespan: span };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  showDashboard(data);
}

function showDashboard(data) {
  document.getElementById('setup').style.display = 'none';
  const dash = document.getElementById('dashboard');
  dash.style.display = 'flex';
  compute(data);
  // Auto-refresh at midnight
  scheduleNextUpdate(data);
}

function compute(data) {
  const now = new Date();
  const dob = new Date(data.dob + 'T00:00:00');
  const deathDate = new Date(dob);
  deathDate.setFullYear(dob.getFullYear() + data.lifespan);

  const MS = 1;
  const SEC = 1000 * MS;
  const MIN = 60 * SEC;
  const HOUR = 60 * MIN;
  const DAY = 24 * HOUR;
  const WEEK = 7 * DAY;

  const totalMs = deathDate - dob;
  const remainMs = Math.max(0, deathDate - now);
  const livedMs = Math.max(0, now - dob);

  const totalWeeks = Math.floor(totalMs / WEEK);
  const weeksLived = Math.floor(livedMs / WEEK);
  const weeksRemaining = Math.max(0, totalWeeks - weeksLived);

  const remYears = Math.floor(remainMs / (365.25 * DAY));
  const remMonths = Math.floor(remainMs / (30.44 * DAY));
  const remWeeks = Math.floor(remainMs / WEEK);
  const remDays = Math.floor(remainMs / DAY);
  const remHours = Math.floor(remainMs / HOUR);

  const pctLived = Math.min(100, (livedMs / totalMs) * 100);
  const pctRemaining = Math.max(0, 100 - pctLived);

  // Update DOM
  document.getElementById('weeks-big').textContent = fmt(weeksRemaining);
  document.getElementById('total-weeks-label').textContent = fmt(totalWeeks);
  document.getElementById('stat-years').textContent = fmt(remYears);
  document.getElementById('stat-months').textContent = fmt(remMonths);
  document.getElementById('stat-weeks').textContent = fmt(remWeeks);
  document.getElementById('stat-days').textContent = fmt(remDays);
  document.getElementById('stat-hours').textContent = fmt(remHours);

  document.getElementById('pct-lived').textContent = pctLived.toFixed(2) + '%';
  document.getElementById('progress-bar').style.width = pctLived.toFixed(2) + '%';
  document.getElementById('info-dob').textContent = dob.toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
  document.getElementById('info-death').textContent = deathDate.toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
  document.getElementById('info-pct-remaining').textContent = pctRemaining.toFixed(4) + '%';

  buildGrid(totalWeeks, weeksLived);
}

function fmt(n) {
  return n.toLocaleString('en-US');
}

function buildGrid(total, lived) {
  const grid = document.getElementById('week-grid');
  grid.innerHTML = '';
  const frag = document.createDocumentFragment();
  for (let i = 0; i < total; i++) {
    const box = document.createElement('div');
    box.className = 'week-box ' + (i < lived - 1 ? 'lived' : i === lived - 1 ? 'current' : 'remaining');
    frag.appendChild(box);
  }
  grid.appendChild(frag);
}

function scheduleNextUpdate(data) {
  const now = new Date();
  const tomorrow = new Date(now);
  tomorrow.setDate(tomorrow.getDate() + 1);
  tomorrow.setHours(0, 0, 1, 0);
  const msUntilMidnight = tomorrow - now;
  setTimeout(() => {
    compute(data);
    scheduleNextUpdate(data);
  }, msUntilMidnight);
}

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
    document.body.classList.add('fullscreen');
  } else {
    document.exitFullscreen();
    document.body.classList.remove('fullscreen');
  }
}

function exportWallpaper() {
  // Snapshot using browser print
  window.print();
}

function resetApp() {
  if (confirm('Reset and re-enter your data?')) {
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  }
}

// Auto-load from storage
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try {
      const data = JSON.parse(saved);
      document.getElementById('dob').value = data.dob;
      document.getElementById('lifespan').value = data.lifespan;
      showDashboard(data);
    } catch(e) { localStorage.removeItem(STORAGE_KEY); }
  }
});
</script>

<style>
@media print {
  #setup { display: none !important; }
  #dashboard {
    display: flex !important;
    padding: 20px;
    background: #000 !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .actions { display: none; }
}
</style>
</body>
</html>
